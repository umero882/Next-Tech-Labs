server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    image/svg+xml application/xml application/x-font-ttf font/woff font/woff2;

  # Long-cache hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static project images (covers, screenshots) — cache moderately.
  # Use a regex so SPA routes like /projects/password-manager (no extension)
  # fall through to the catch-all SPA fallback below.
  location ~* ^/projects/.+\.(png|jpe?g|gif|svg|webp|avif|ico|mp4|webm)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Healthcheck
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # SPA fallback for client-side routing.
  # We omit $uri/ so directory paths fall through to /index.html instead of
  # triggering nginx's directory-handling 403 when no index exists in the dir.
  location / {
    try_files $uri /index.html;
  }

  # Don't index hidden files
  location ~ /\.(?!well-known) {
    deny all;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    image/svg+xml application/xml application/x-font-ttf font/woff font/woff2;

  # Long-cache hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static project images (covers, screenshots) — cache moderately
  location /projects/ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Healthcheck
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # SPA fallback for client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't index hidden files
  location ~ /\.(?!well-known) {
    deny all;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
